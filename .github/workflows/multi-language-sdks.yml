name: Multi-Language SDKs

on:
  push:
    branches:
      - main
    paths:
      - "sdks/**"
      - ".github/workflows/multi-language-sdks.yml"
      - "README.md"
  pull_request:
    paths:
      - "sdks/**"
      - ".github/workflows/multi-language-sdks.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test Python SDK
        working-directory: sdks/python
        run: |
          python -m unittest discover -s tests
          python examples/basic_client.py
          python -m pip install . --target /tmp/gbz185-python-install
          PYTHONPATH=/tmp/gbz185-python-install python - <<'PY'
          from gbz185_sdk import AgentIdentityCodeParts, format_identity_code, validate_identity_code
          code = format_identity_code(AgentIdentityCodeParts("A1", "REQ001", "CALENDAR", "1"))
          assert code == "1.2.156.3088.1.A1.REQ001.CALENDAR.1"
          assert validate_identity_code(code)
          PY

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Test Go SDK
        working-directory: sdks/go
        run: go test ./...

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Rust SDK
        working-directory: sdks/rust
        run: |
          rustup default stable
          cargo fmt --check
          cargo test
          cargo package --allow-dirty

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test Java SDK
        working-directory: sdks/java
        run: mvn test
