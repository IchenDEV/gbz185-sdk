<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1120 720">
  <title id="title">GB/Z 185 SDK runtime architecture</title>
  <desc id="desc">A layered diagram showing TypeScript SDK clients, JSON transport, reference runtime modules, memory repositories, and GB/Z 185 functional coverage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="52%" stop-color="#edf7f3"/>
      <stop offset="100%" stop-color="#fff8ef"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#14324a" flood-opacity="0.14"/>
    </filter>
    <style>
      .label { fill: #17242f; font: 700 23px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #536474; font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #657586; font: 600 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .code { fill: #173042; font: 700 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .box { fill: url(#panel); stroke: #c8d7e4; stroke-width: 1.4; filter: url(#softShadow); }
      .subbox { fill: #ffffff; stroke: #d6e1eb; stroke-width: 1.2; }
      .chip { fill: #ecf6f2; stroke: #b9d8ca; stroke-width: 1; }
      .chip2 { fill: #fff4e7; stroke: #efd0a8; stroke-width: 1; }
      .line { fill: none; stroke: #6d8293; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #88a0b0; stroke-width: 2; stroke-dasharray: 7 8; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1120" height="720" rx="34" fill="url(#bg)"/>
  <rect x="56" y="52" width="1008" height="616" rx="28" fill="#ffffff" opacity=".52"/>

  <g transform="translate(88 82)">
    <text class="label" x="0" y="0">GB/Z 185 TypeScript SDK</text>
    <text class="small" x="0" y="30">Identity, description, discovery, interaction, message distribution, and tool access in one JSON-neutral runtime.</text>
  </g>

  <g transform="translate(80 152)">
    <rect class="box" x="0" y="0" width="960" height="96" rx="18"/>
    <text class="tiny" x="34" y="34">APPLICATION LAYER</text>
    <text class="label" x="34" y="66">AgentInterconnectClient</text>
    <rect class="chip" x="332" y="22" width="168" height="42" rx="21"/>
    <text class="code" x="362" y="48">JsonTransport</text>
    <rect class="chip" x="520" y="22" width="180" height="42" rx="21"/>
    <text class="code" x="548" y="48">InProcess</text>
    <rect class="chip2" x="720" y="22" width="188" height="42" rx="21"/>
    <text class="code" x="746" y="48">HTTP adapter</text>
  </g>

  <path class="line" d="M560 250v52"/>
  <path class="line" d="M548 290l12 14 12-14"/>

  <g transform="translate(80 306)">
    <rect class="box" x="0" y="0" width="960" height="214" rx="20"/>
    <text class="tiny" x="34" y="38">REFERENCE RUNTIME</text>
    <g transform="translate(34 62)">
      <rect class="subbox" x="0" y="0" width="206" height="54" rx="14"/>
      <text class="code" x="18" y="33">Identity</text>
      <text class="small" x="92" y="33">GB/Z 185.2-3</text>
    </g>
    <g transform="translate(258 62)">
      <rect class="subbox" x="0" y="0" width="206" height="54" rx="14"/>
      <text class="code" x="18" y="33">Description</text>
      <text class="small" x="122" y="33">185.4</text>
    </g>
    <g transform="translate(482 62)">
      <rect class="subbox" x="0" y="0" width="206" height="54" rx="14"/>
      <text class="code" x="18" y="33">Discovery</text>
      <text class="small" x="112" y="33">185.5</text>
    </g>
    <g transform="translate(706 62)">
      <rect class="subbox" x="0" y="0" width="206" height="54" rx="14"/>
      <text class="code" x="18" y="33">Interaction</text>
      <text class="small" x="124" y="33">185.6</text>
    </g>
    <g transform="translate(146 134)">
      <rect class="subbox" x="0" y="0" width="268" height="54" rx="14"/>
      <text class="code" x="18" y="33">ToolAccessRuntime</text>
      <text class="small" x="182" y="33">185.7</text>
    </g>
    <g transform="translate(438 134)">
      <rect class="subbox" x="0" y="0" width="320" height="54" rx="14"/>
      <text class="code" x="18" y="33">MessageDistributionRuntime</text>
    </g>
  </g>

  <path class="dash" d="M172 522v55h776v-55"/>
  <path class="line" d="M560 520v60"/>
  <path class="line" d="M548 568l12 14 12-14"/>

  <g transform="translate(116 588)">
    <rect class="chip" x="0" y="0" width="190" height="48" rx="24"/>
    <text class="code" x="28" y="30">Memory stores</text>
    <rect class="chip2" x="220" y="0" width="210" height="48" rx="24"/>
    <text class="code" x="250" y="30">X.509-first APIs</text>
    <rect class="chip" x="460" y="0" width="220" height="48" rx="24"/>
    <text class="code" x="486" y="30">Conformance map</text>
    <rect class="chip2" x="710" y="0" width="178" height="48" rx="24"/>
    <text class="code" x="744" y="30">Adapters</text>
  </g>
</svg>
